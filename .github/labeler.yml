# Configuration for the auto-labeler workflow.
# Maps labels to file glob patterns.

integration:
  - changed-files:
      - any-glob-to-any-file: "custom_components/syncthing_extended/**"

tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "images/**"
          - "LICENSE"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

translations:
  - changed-files:
      - any-glob-to-any-file: "custom_components/syncthing_extended/translations/**"

config-flow:
  - changed-files:
      - any-glob-to-any-file:
          - "custom_components/syncthing_extended/config_flow.py"
          - "custom_components/syncthing_extended/strings.json"
