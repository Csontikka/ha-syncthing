<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#daa520"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Circuit board pattern -->
  <g stroke="#1a3a5c" stroke-width="1" opacity="0.5" fill="none">
    <line x1="0" y1="40" x2="180" y2="40"/>
    <line x1="180" y1="40" x2="200" y2="60"/>
    <line x1="200" y1="60" x2="340" y2="60"/>
    <circle cx="180" cy="40" r="3" fill="#1a3a5c"/>
    <circle cx="340" cy="60" r="3" fill="#1a3a5c"/>
    <line x1="900" y1="35" x2="1060" y2="35"/>
    <line x1="1060" y1="35" x2="1080" y2="55"/>
    <line x1="1080" y1="55" x2="1200" y2="55"/>
    <circle cx="1060" cy="35" r="3" fill="#1a3a5c"/>
    <line x1="780" y1="50" x2="860" y2="50"/>
    <line x1="860" y1="50" x2="880" y2="30"/>
    <line x1="880" y1="30" x2="980" y2="30"/>
    <circle cx="860" cy="50" r="3" fill="#1a3a5c"/>
    <line x1="0" y1="250" x2="120" y2="250"/>
    <line x1="120" y1="250" x2="140" y2="270"/>
    <line x1="140" y1="270" x2="300" y2="270"/>
    <circle cx="120" cy="250" r="3" fill="#1a3a5c"/>
    <line x1="850" y1="255" x2="1000" y2="255"/>
    <line x1="1000" y1="255" x2="1020" y2="240"/>
    <line x1="1020" y1="240" x2="1200" y2="240"/>
    <circle cx="1000" cy="255" r="3" fill="#1a3a5c"/>
    <line x1="700" y1="265" x2="820" y2="265"/>
    <circle cx="820" cy="265" r="3" fill="#1a3a5c"/>
    <line x1="1150" y1="80" x2="1150" y2="220"/>
    <line x1="1120" y1="100" x2="1150" y2="100"/>
    <line x1="1120" y1="180" x2="1150" y2="180"/>
    <circle cx="1150" cy="100" r="3" fill="#1a3a5c"/>
    <circle cx="1150" cy="180" r="3" fill="#1a3a5c"/>
    <line x1="50" y1="80" x2="50" y2="130"/>
    <line x1="50" y1="130" x2="70" y2="150"/>
    <circle cx="50" cy="80" r="3" fill="#1a3a5c"/>
  </g>

  <!-- Syncthing official-style logo -->
  <g transform="translate(138, 130)">
    <circle cx="0" cy="0" r="55" fill="#1a8fc1" opacity="0.15"/>
    <circle cx="0" cy="0" r="46" fill="#1a6ea8"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#2ea8d8" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="32" fill="#0d4f7c"/>
    <path d="M 0 -26 A 26 26 0 0 1 22.5 13" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <polygon points="22.5,13 33,3.5 17.3,5.2" fill="white" transform="rotate(30,22.5,13)"/>
    <path d="M 0 26 A 26 26 0 0 1 -22.5 -13" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <polygon points="-22.5,-13 -33,-3.5 -17.3,-5.2" fill="white" transform="rotate(210,-22.5,-13)"/>
    <circle cx="0" cy="0" r="4.5" fill="white" opacity="0.9"/>
  </g>

  <!-- V2: Syncthing big, Extended below in gold -->
  <text x="240" y="140" font-family="'Arial Black', 'Impact', Arial, sans-serif" font-size="82" font-weight="900" fill="white" letter-spacing="-1">Syncthing</text>
  <text x="240" y="190" font-family="'Arial Black', 'Impact', Arial, sans-serif" font-size="44" font-weight="900" fill="url(#gold)" letter-spacing="6">EXTENDED</text>

  <!-- Divider line with glow -->
  <line x1="240" y1="205" x2="1000" y2="205" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="620" y="242" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="600" fill="#00b4d8" text-anchor="middle" letter-spacing="2">Home Assistant Integration</text>
</svg>
